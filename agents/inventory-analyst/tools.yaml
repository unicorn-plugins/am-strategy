tools:
  - name: file_read
    description: "인벤토리 템플릿·DORA 참조·분석 결과 파일 읽기"
    input: { 파일경로 }
    output: { 파일내용 }

  - name: file_write
    description: "인벤토리·등급·스코어카드·기술부채 보고서 저장"
    input: { 저장경로, 마크다운본문 }
    output: { 저장결과 }

  - name: document_convert
    description: "사용자가 Office 문서(.xlsx/.docx/.pptx) 인벤토리 자료를 제공한 경우 Markdown으로 변환"
    input: { 입력파일경로, 출력디렉토리 }
    output: { 변환된마크다운경로 }

  - name: user_interact
    description: "결측 인벤토리 항목을 관련 팀에 질문"
    input: { 질문목록 }
    output: { 답변목록 }
