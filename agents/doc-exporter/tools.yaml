tools:
  - name: file_read
    description: "strategy-report.md 및 ppt-guide 참조 읽기"
    input: { 파일경로 }
    output: { 파일내용 }

  - name: file_write
    description: "변환 중간 파일 및 매니페스트 저장"
    input: { 저장경로, 본문 }
    output: { 저장결과 }

  - name: delegate_docx
    description: "anthropic-skills의 docx 스킬에 위임하여 .docx 생성"
    input: { 원본마크다운경로, 출력경로, 옵션 }
    output: { 생성된docx경로 }

  - name: delegate_pptx
    description: "anthropic-skills의 pptx 스킬에 위임하여 .pptx 생성 (ppt-guide 표준 적용)"
    input: { 슬라이드개요, 출력경로, 옵션 }
    output: { 생성된pptx경로 }

  - name: image_generate
    description: "generate_image 도구로 인포그래픽 이미지 생성"
    input: { 프롬프트, 출력경로 }
    output: { 생성된이미지경로 }

  - name: user_interact
    description: "출력 장수·인포그래픽 옵션 필수 확인"
    input: { 질문목록 }
    output: { 답변목록 }
